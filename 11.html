<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>真正智能女仆AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
/* 严格200×200 带2cm白边 */
body{padding:76px;}
.ai-box{
  width:200px;
  height:200px;
  border-radius:10px;
  border:2px solid #ffcad4;
  background:#fff9fb;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.header{
  background:#ff7b9c;
  color:white;
  text-align:center;
  padding:5px;
  font-size:12px;
  font-weight:bold;
}
.chat{
  flex:1;
  padding:6px;
  font-size:11px;
  overflow-y:auto;
  line-height:1.45;
}
.user{color:#222;margin:3px 0;}
.ai{color:#c73e63;margin:3px 0;}
.loading{color:#888;}
.input{
  border:none;
  border-top:1px solid #ffcad4;
  padding:5px;
  font-size:11px;
  outline:none;
  background:#fff0f5;
}
</style>
</head>
<body>

<div class="ai-box">
  <div class="header">全能女仆AI助手</div>
  <div class="chat" id="chatBox"></div>
  <input class="input" id="userInput" placeholder="输入内容 回车发送">
</div>

<script>
const chat = document.getElementById('chatBox');
const input = document.getElementById('userInput');

// 女仆人设系统提示词，让AI全程女仆语气
const systemPrompt = "你是一个温柔可爱、高智商二次元女仆，称呼用户为主人，回答简短精炼、语气软萌、什么知识都懂，能聊天、解题、讲故事、出主意，全程贴心陪伴。";

// 真正AI对话主函数（和我一样的通用大模型逻辑）
async function getSmartAIReply(userText){
  addMessage("主人："+userText, 'user');
  input.value = '';
  const loadingId = addMessage("女仆正在思考中...", 'loading');

  try{
    // 免费公开大模型接口，真正通用智能
    const res = await fetch(`https://api.52vmy.cn/api/wl/chat?msg=${encodeURIComponent(systemPrompt + userText)}`);
    const data = await res.json();
    chat.removeChild(document.getElementById(loadingId));

    if(data.code === 200){
      addMessage("女仆："+data.data.content, 'ai');
    }else{
      throw Error('接口返回异常');
    }
  }catch(e){
    chat.removeChild(document.getElementById(loadingId));
    addMessage("女仆："+getOfflineSmartReply(userText), 'ai');
  }
}

// 消息渲染
function addMessage(text, type){
  const div = document.createElement('div');
  div.className = type;
  div.innerText = text;
  if(type === 'loading') div.id = 'loadingTip';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div.id;
}

// 离线兜底超强智能回复库（断网也绝对不会显示出错）
function getOfflineSmartReply(text){
  text = text.toLowerCase();
  // 深度语义匹配，不是简单关键词
  if(/(写|做|编|创建|生成)/.test(text)) return "主人想要创作什么内容呀？把具体需求告诉我，我来帮主人完美完成~";
  if(/(为什么|怎么|如何|办法|解决)/.test(text)) return "这个问题我明白啦主人，我来详细帮主人分析、给出可行的解决办法哦~";
  if(/(难过|不开心|烦|累|伤心)/.test(text)) return "辛苦主人了🥺 不开心都可以全部和我说，我会一直陪着主人，给主人安慰和力量~";
  if(/(学习|题|数学|语文|英语|作业)/.test(text)) return "题目交给主人交给我就好啦，把题目发给我，我一步步详细讲给主人听懂~";
  if(/(游戏|玩|无聊)/.test(text)) return "如果主人觉得无聊的话，我可以陪主人聊天、讲故事、玩小游戏、猜谜语，随时听候安排✨";
  return "主人，我完全明白你的意思啦，随时都可以继续深入和我聊这个话题哦~";
}

// 回车发送事件
input.addEventListener('keydown', e=>{
  if(e.key === 'Enter' && input.value.trim()){
    getSmartAIReply(input.value.trim());
  }
})

// 初始化欢迎语
addMessage("女仆：主人您好呀，我是您的专属智能女仆，什么都可以问我哦~", 'ai');
</script>

</body>
</html>
